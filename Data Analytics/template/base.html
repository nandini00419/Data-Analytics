<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Data Analytics Dashboard{% endblock %}</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
        nav { background-color: #333; color: white; padding: 10px; }
        nav a { color: white; margin: 0 15px; text-decoration: none; }
        nav a:hover { text-decoration: underline; }
        .container { padding: 20px; }
        img { max-width: 100%; height: auto; margin: 10px 0; }
        iframe { width: 100%; height: 600px; border: none; }
    </style>
</head>
<body>
    <nav>
        <a href="/">Home</a>
        <a href="/eda">EDA</a>
        <a href="/time_series">Time Series</a>
        <a href="/correlation">Correlation</a>
        <a href="/geo">Geo</a>
        <a href="/predictive">Predictive</a>
        <a href="/policy_impact">Policy Impact</a>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
